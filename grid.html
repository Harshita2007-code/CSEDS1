<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid introduction</title>
    <style>
        body{
            height:100vh;
            width:100vh;
        }
        .container{
            background-color: aqua;
            height: 100vh;
            width: 100%;
            display: grid;
            text-align: center;
            font-size:x-large;
            border: 2px solid black;
            grid-template-columns: repeat 6,1fr;
            grid-template-rows: repeat 6,1fr;
        }
        .item{
            background-color: rgb(240, 126, 210);
            border: 1px solid rgb(244, 183, 183);
        }
        .item1{
            grid-column: 1/7;
            grid-row: 1/2;
            background-color: rgb(220, 183, 255);
        }
        .item2{
            grid-column: 1/3;
            grid-row: 2/4;
            background-color: rgb(150, 249, 239);
        }
        .item3{
             grid-column: 3/7;
            grid-row: 2/4;
            background-color: rgb(255, 166, 166);
        }
        .item4{
             grid-column: 1/4;
            grid-row: 4/6;
            background-color: rgb(207, 243, 171);
        }
        .item5{
             grid-column: 4/7 ;
            grid-row: 4/6;
            background-color: rgb(255, 207, 190);
        }
        .item6{
             grid-column: 1/7;
            grid-row: 6/7;
            background-color: rgb(226, 255, 196);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">header</div>
        <div class="item item2">side menu</div>
        <div class="item item3"> main content</div>
        <div class="item item4">content1</div>
        <div class="item item5">content2</div>
        <div class="item item6">footer</div>

    </div>
</body>
</html>
