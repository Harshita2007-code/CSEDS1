<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            max-width: 400px;
        }
        input[type="submit"]{
            background-color: #4CAF50;}
    </style>
</head>
<body>
    <center><h2>STUDENT REGISTRATION FORM</h2></center>

    <center><form action="#" method="post">
        <label for="full name">Full Name</label><br>
        <input type="text" id="full name" name="full name" placeholder="enter full name" required><br><br>

        <label for="dob">Date of Birth</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="email">Email Address:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter valid email address" required><br><br>

         <label for="password">Password</label><br>
        <input type="password" id="password" name="password" placeholder="Enter password" required><br><br>

        <label for="gender">Gender</label><br>
        <select id="gender" name="gender" required><br><br>
            <option value="">--Select--</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select><br><br>

        <label for="phone">Phone Number</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required><br><br>

        <label for="address">Address</label><br>
        <textarea id="address" name="address" placeholder="Enter your address" required></textarea><br><br>

        <label for="course">Course</label><br>
    <select id="course" name="course" required><br><br>
      <option value=""> Select Course </option>
      <option value="B.Tech">B.Tech</option>
      <option value="BCA">BCA</option>
      <option value="B.Sc">B.Sc</option>
      <option value="MCA">MCA</option>
      <option value="MBA">MBA</option>
    </select></center>

    <center><input type="submit" value="Register"></center> 
    <center><footer>
    <p> &copy; 2025 Student Registration Portal</p>
    </footer></center> 
        
    </form>
</body>
</html>
